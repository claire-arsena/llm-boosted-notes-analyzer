<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Analyseur de Notes — Interface moderne pour analyser vos notes via une API REST." />
  <title>Analyseur de Notes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <main class="app-container">

    <header class="header">
      <h1 class="header__title">Analyseur de Notes</h1>
      <p class="header__subtitle">Collez votre note ci-dessous et laissez l'IA l'analyser.</p>
    </header>

    <section class="glass input-section">
      <label for="noteInput" class="input-label">Votre note</label>
      <textarea id="noteInput" rows="6" placeholder="Écrivez ou collez votre note ici…" class="input-textarea"></textarea>
      <button id="analyzeBtn" class="btn-analyze">
        <span id="btnLabel">Analyser la note</span>
      </button>
    </section>

    <section id="results" class="results-grid">
      <div id="cardSummary" class="result-card result-card--full-width glass">
        <h2 class="card-header">
          <svg class="card-header__icon card-header__icon--accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Résumé
        </h2>
        <p id="summaryText" class="card-body-text">—</p>
      </div>

      <div id="cardSentiment" class="result-card result-card--delay-1 glass">
        <h2 class="card-header">
          <svg class="card-header__icon card-header__icon--positive" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Sentiment
        </h2>
        <p id="sentimentText" class="card-body-text card-body-text--large">—</p>
      </div>

      <div id="cardTags" class="result-card result-card--delay-2 result-card--two-cols glass">
        <h2 class="card-header">
          <svg class="card-header__icon card-header__icon--accent-light" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5a1.99 1.99 0 011.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
          </svg>
          Tags
        </h2>
        <div id="tagsContainer" class="tags-container">
          <span class="card-body-text card-body-text--placeholder">—</span>
        </div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
